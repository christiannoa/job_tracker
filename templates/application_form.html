{% extends "main.html" %} {% block title %}{{ action }} Application —
JobTracker{% endblock %} {% block page_title %}{{ action }} Application{%
endblock %} {% block topbar_actions %}
<a href="{{ url_for('applications') }}" class="btn btn-secondary">← Back</a>
{% endblock %} {% block content %}
<div class="form-card">
  <div class="form-card-header">
    <div class="table-title">{{ action }} Application</div>
  </div>
  <form method="POST">
    <div class="form-card-body">
      <div class="form-grid">
        <div class="form-group form-col-span">
          <label>Job *</label>
          <select name="job_id" required>
            <option value="">— Select Job —</option>
            {% for j in jobs %}
            <option
              value="{{ j.job_id }}"
              {%
              if
              application
              and
              application.job_id=""
              ="j.job_id"
              %}selected{%
              endif
              %}
            >
              {{ j.job_title }} {% if j.company_name %}@ {{ j.company_name }}{%
              endif %}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Application Date *</label>
          <input
            type="date"
            name="application_date"
            required
            value="{{ application.application_date.strftime('%Y-%m-%d') if application and application.application_date else '' }}"
          />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select name="status">
            {% for s in
            ['Applied','Screening','Interview','Offer','Rejected','Withdrawn']
            %}
            <option
              value="{{ s }}"
              {%
              if
              application
              and
              application.status=""
              ="s"
              %}selected{%
              endif
              %}
            >
              {{ s }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Resume Version</label>
          <input
            type="text"
            name="resume_version"
            value="{{ application.resume_version if application else '' }}"
            placeholder="e.g. v2.1, tech-2024"
          />
        </div>
        <div class="form-group">
          <label>Interview Notes (JSON or text)</label>
          <input
            type="text"
            name="interview_data"
            value="{{ application.interview_data if application else '' }}"
            placeholder='{"rounds": [{"type": "phone"}]}'
          />
        </div>
        <div class="form-group form-col-span">
          <div class="form-check">
            <input
              type="checkbox"
              name="cover_letter_sent"
              id="cls"
              value="1"
              {%
              if
              application
              and
              application.cover_letter_sent
              %}checked{%
              endif
              %}
            />
            <label for="cls">Cover letter sent</label>
          </div>
        </div>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">
        {{ action }} Application
      </button>
      <a href="{{ url_for('applications') }}" class="btn btn-secondary"
        >Cancel</a
      >
    </div>
  </form>
</div>
{% endblock %}
